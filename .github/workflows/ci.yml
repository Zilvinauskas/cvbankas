name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip dependencies
        run: pip install ruff==0.15.2 mypy pydantic

      - name: Run ruff (linter)
        run: ruff check .

      - name: Run mypy (type checker)
        run: mypy cvbankas/ downloaders/
